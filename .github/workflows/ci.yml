name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: gojiplus/py-canon/.github/workflows/reusable-ci.yml@v1
    with:
      wheel-import: preen
      coverage-floor: 0
      python-versions: '["3.12", "3.14"]'
